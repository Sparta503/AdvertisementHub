<section class="py-16 bg-gray-50">
  <div class="container mx-auto px-6">
    <h2 class="text-3xl font-bold text-center mb-12">Contact Us</h2>
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
      <form>
        <div class="mb-4">
          <label class="block text-gray-700 mb-2" for="name">Name</label>
          <input class="w-full px-3 py-2 border border-gray-300 rounded-lg" type="text" id="name" name="name">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-2" for="email">Email</label>
          <input class="w-full px-3 py-2 border border-gray-300 rounded-lg" type="email" id="email" name="email">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-2" for="message">Message</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg" id="message" name="message" rows="4"></textarea>
        </div>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition" type="submit">Send Message</button>
      </form>
    </div>
  </div>
</section>
